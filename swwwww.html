<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Card Carousel</title>
<style>
  body {
    background: #0f0f0f;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .carousel-container {
    width: 90%;
    overflow: hidden;
    position: relative;
  }

  .carousel-track {
    display: flex;
    gap: 20px;
    animation: scroll 20s linear infinite;
  }

  .carousel-container:hover .carousel-track {
    animation-play-state: paused;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .card {
    flex: 0 0 200px; /* width */
    height: 220px; /* height */
    background: linear-gradient(to right, #050505, #201F21);
    border-radius: 25px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-top img.logo {
    width: 100px;
    height: 25px;
    object-fit: contain;
  }

  .rating {
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 14px;
    color: #fff;
  }

  .rating img.star {
    width: 14px;
    height: 14px;
    margin-right: 5px;
  }

  .card-bottom p {
    color: #9ca3af;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="carousel-container">
  <div class="carousel-track">

    <!-- Card 1 -->
    <div class="card">
      <div class="card-top">
        <img class="logo" src="https://via.placeholder.com/100x25.png?text=Logo+1" alt="Logo 1">
        <div class="rating">
          <img class="star" src="https://via.placeholder.com/14x14.png?text=★" alt="Star">
          4.0
        </div>
      </div>
      <div class="card-bottom">
        <p>Top gaming app development 2026</p>
      </div>
    </div>
